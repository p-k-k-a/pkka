name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            workflows:
              - '.github/workflows/**'

  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: frontend/.turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.base_ref || github.ref_name }}-
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm run format:check

      - name: Lint, typecheck, build (affected)
        if: github.event_name == 'pull_request'
        run: pnpm exec turbo run lint typecheck build --filter='[origin/${{ github.base_ref }}]'

      - name: Lint, typecheck, build (full)
        if: github.event_name != 'pull_request'
        run: pnpm exec turbo run lint typecheck build

  backend:
    name: Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 26
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Spotless check
        run: ./gradlew spotlessCheck

      - name: Build & test (Error Prone strict)
        run: ./gradlew build -Pstrict

      - name: Publish test report
        if: success() || failure()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: backend/build/test-results/test/TEST-*.xml

  workflows-lint:
    name: Workflows lint
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: reviewdog/action-actionlint@v1
        with:
          fail_on_error: true

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pr-title:
    name: PR title (Conventional Commits)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            style
            refactor
            perf
            test
            build
            ci
            revert

  ci-passed:
    name: CI passed
    if: always()
    needs: [changes, frontend, backend, workflows-lint, gitleaks, pr-title]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs
        run: |
          for r in \
            '${{ needs.changes.result }}' \
            '${{ needs.frontend.result }}' \
            '${{ needs.backend.result }}' \
            '${{ needs.workflows-lint.result }}' \
            '${{ needs.gitleaks.result }}' \
            '${{ needs.pr-title.result }}'; do
            case "$r" in
              success|skipped) ;;
              *) echo "Required job failed: $r"; exit 1 ;;
            esac
          done
