name: pkka

services:
  postgres:
    image: postgres:16
    container_name: iam-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - iam-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.8
    container_name: iam-keycloak
    command: start-dev # Development mode, switch to "start" in production
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: "8081"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iam-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/health/ready | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mailpit:
    image: axllent/mailpit:latest
    container_name: iam-mailpit
    ports:
      - "8025:8025"   # UI web
      - "1025:1025"   # SMTP
    networks:
      - iam-network

  pkka-postgres:
    image: postgres:16
    container_name: pkka-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: pkka
      POSTGRES_USER: pkka
      POSTGRES_PASSWORD: pkka
    volumes:
      - app_postgres_data:/var/lib/postgresql/data
    networks:
      - iam-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pkka -d pkka"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pkka-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://pkka-postgres:5432/pkka
      SPRING_DATASOURCE_USERNAME: pkka
      SPRING_DATASOURCE_PASSWORD: pkka
      # Backend talking to Keycloak inside the network:
      KEYCLOAK_URL: http://iam-keycloak:8081
      # WARN: the issuer-uri of tokens issued by Keycloak uses the `localhost`
      # host (from KC_HOSTNAME=localhost), so JWT validation from inside the
      # container won't work out-of-the-box. For now, run the backend from the
      # IDE when testing auth.
      KEYCLOAK_ISSUER_URI: http://localhost:8081/realms/pkka
    depends_on:
      pkka-postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - iam-network

volumes:
  postgres_data:
  app_postgres_data:

networks:
  iam-network:
    driver: bridge
