spring:
  application:
    name: pkka-backend
  profiles:
    default: dev

# OpenAPI / Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
    display-request-duration: true
    disable-swagger-default-url: true


# PROFILE: dev
---
spring:
  config:
    activate:
      on-profile: dev

  # OAuth2 / OIDC (Keycloak)
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: pkka-app
            client-secret: ${KEYCLOAK_CLIENT_SECRET:change-me}
            scope: openid, profile, email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/pkka}
            user-name-attribute: preferred_username

# OpenAPI — enabled on dev
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

# Keycloak Admin Client
keycloak:
  server-url: ${KEYCLOAK_URL:http://localhost:8081}
  realm: ${KEYCLOAK_REALM:pkka}
  client-id: ${KEYCLOAK_CLIENT_ID:pkka-app}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:change-me}

# Discord
discord:
  guild-id: ${DISCORD_GUILD_ID:change-me}

# Server
server:
  port: 8080

# Logging
logging:
  level:
    root: INFO
    pl.edu.agh.pkka: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG

# PROFILE: prod
---
spring:
  config:
    activate:
      on-profile: prod

  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: ${KEYCLOAK_CLIENT_ID}
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            scope: openid, profile, email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI}
            user-name-attribute: preferred_username

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

keycloak:
  server-url: ${KEYCLOAK_URL}
  realm: ${KEYCLOAK_REALM}
  client-id: ${KEYCLOAK_CLIENT_ID}
  client-secret: ${KEYCLOAK_CLIENT_SECRET}

discord:
  guild-id: ${DISCORD_GUILD_ID}

server:
  port: ${PORT:8080}
  tomcat:
    remote-ip-header: x-forwarded-for
    protocol-header: x-forwarded-proto

logging:
  level:
    root: WARN
    pl.edu.agh.pkka: INFO