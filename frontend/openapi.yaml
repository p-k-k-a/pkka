openapi: 3.0.3
info:
  title: PKKA Backend API
  description: REST API for the Alumni Club platform of the AGH Faculty of Computer Science.
  version: v1
paths:
  /api/announcements:
    get:
      summary: Pobiera listę ogłoszeń
      operationId: getAnnouncements
      responses:
        "200":
          description: Lista ogłoszeń pobrana pomyślnie
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"

  /api/blog-posts/{slug}:
    get:
      summary: Pobiera pojedynczy wpis bloga
      operationId: getBlogPostBySlug
      parameters:
        - name: slug
          in: path
          required: true
          description: Przyjazny URL wpisu
          schema:
            type: string
      responses:
        "200":
          description: Wpis bloga pobrany pomyślnie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"

  /api/events:
    get:
      summary: Pobiera listę wydarzeń
      operationId: getEvents
      responses:
        "200":
          description: Lista wydarzeń pobrana pomyślnie
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"

components:
  schemas:
    Author:
      type: object
      required:
        - name
        - role
      properties:
        name:
          type: string
          x-faker: person.fullName
        role:
          type: string
          x-faker: person.jobTitle
        avatarUrl:
          type: string
          x-faker: image.avatar

    Announcement:
      type: object
      required:
        - id
        - title
        - description
        - content
        - date
        - time
        - tag
        - imageUrl
        - slug
        - author
      properties:
        id:
          type: string
          description: Unikalne ID ogłoszenia
        title:
          type: string
          description: Tytuł ogłoszenia
        description:
          type: string
          description: Krótki opis (zajawka na liście ogłoszeń)
          x-faker: lorem.sentence
        content:
          type: string
          description: Pełna treść ogłoszenia z akapitami
          x-faker: lorem.paragraphs
        date:
          type: string
          description: Data w formacie tekstowym (np. 10 maja 2026)
        time:
          type: string
          description: Godzina publikacji (np. 14:30)
        tag:
          type: string
          description: Kategoria (np. Wydarzenie, Warsztaty)
        imageUrl:
          type: string
          description: Ścieżka do obrazka
        slug:
          type: string
          description: Przyjazny URL
        author:
          $ref: "#/components/schemas/Author"

    BlogPost:
      type: object
      required:
        - id
        - title
        - description
        - content
        - publishedAt
        - tag
        - imageUrl
        - slug
        - author
      properties:
        id:
          type: string
          description: Unikalne ID wpisu
        title:
          type: string
          description: Tytuł wpisu
          x-faker: lorem.sentence
        description:
          type: string
          description: Krótki opis (zajawka)
          x-faker: lorem.sentence
        content:
          type: string
          description: Pełna treść wpisu z akapitami
          x-faker: lorem.paragraphs
        publishedAt:
          type: string
          format: date-time
          description: Data publikacji ISO 8601
        tag:
          type: string
          description: Kategoria wpisu (np. Wydarzenie, Warsztaty)
        imageUrl:
          type: string
          description: URL obrazka głównego
        slug:
          type: string
          description: Przyjazny URL
        author:
          $ref: "#/components/schemas/Author"

    Event:
      type: object
      required:
        - id
        - title
        - date
        - format
        - access
        - location
      properties:
        id:
          type: string
          description: Unikalne ID wydarzenia
        title:
          type: string
          description: Tytuł wydarzenia
          x-faker: lorem.sentence
        date:
          type: string
          description: Data wydarzenia w formacie tekstowym (np. 12 grudnia 2024)
        format:
          type: string
          description: Forma wydarzenia (Stacjonarnie lub Online)
        access:
          type: string
          description: Poziom dostępu (Publiczne lub Zamknięte)
        location:
          type: string
          description: Miejsce wydarzenia lub opis linku do transmisji
