openapi: 3.0.3
info:
  title: PKKA Backend API
  description: REST API for the Alumni Club platform of the AGH Faculty of Computer Science.
  version: v1
paths:
  /api/announcements:
    get:
      summary: Pobiera listę ogłoszeń
      operationId: getAnnouncements
      responses:
        "200":
          description: Lista ogłoszeń pobrana pomyślnie
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"

  /api/public/posts:
    get:
      summary: Lista opublikowanych postów
      operationId: getPosts
      tags:
        - Posts
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Lista postów pobrana pomyślnie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagePostSummaryResponse"

  /api/public/posts/{slug}:
    get:
      summary: Pojedynczy post po slugu
      operationId: getPostBySlug
      tags:
        - Posts
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Post pobrany pomyślnie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostResponse"
        "404":
          description: Post nie istnieje lub nie jest opublikowany

components:
  schemas:
    Announcement:
      type: object
      required:
        - id
        - title
        - description
        - content
        - date
        - tag
        - imageUrl
        - slug
      properties:
        id:
          type: string
          description: Unikalne ID ogłoszenia
        title:
          type: string
          description: Tytuł ogłoszenia
        description:
          type: string
          description: Krótki opis (zajawka na liście ogłoszeń)
          x-faker: lorem.sentence
        content:
          type: string
          description: Pełna treść ogłoszenia z akapitami
          x-faker: lorem.paragraphs
        date:
          type: string
          description: Data w formacie tekstowym (np. 10 maja 2026)
        tag:
          type: string
          description: Kategoria (np. Wydarzenie, Warsztaty)
        imageUrl:
          type: string
          description: Ścieżka do obrazka
        slug:
          type: string
          description: Przyjazny URL

    PostSummaryResponse:
      type: object
      required:
        - id
        - slug
        - title
        - authorId
        - publishedAt
      properties:
        id:
          type: string
          format: uuid
          description: Wewnętrzne UUID posta
          x-faker: datatype.uuid
        slug:
          type: string
          description: Przyjazny URL identyfikujący post (np. witajcie-na-agh-alumni)
          x-faker: lorem.slug
        title:
          type: string
          description: Tytuł posta
          x-faker: lorem.sentence
        excerpt:
          type: string
          nullable: true
          description: Krótki opis na listing strony, wpisywany ręcznie przez admina
          x-faker: lorem.sentence
        authorId:
          type: string
          description: Keycloak UUID autora
          x-faker: datatype.uuid
        publishedAt:
          type: string
          format: date-time
          description: Data i czas pierwszej publikacji
          x-faker: date.past

    PostResponse:
      type: object
      required:
        - id
        - slug
        - title
        - content
        - authorId
        - publishedAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: Wewnętrzne UUID posta
          x-faker: datatype.uuid
        slug:
          type: string
          description: Przyjazny URL identyfikujący post (np. witajcie-na-agh-alumni)
          x-faker: lorem.slug
        title:
          type: string
          description: Tytuł posta
          x-faker: lorem.sentence
        excerpt:
          type: string
          nullable: true
          description: Krótki opis na listing strony, wpisywany ręcznie przez admina
          x-faker: lorem.sentence
        content:
          type: string
          description: Pełna treść posta w Markdownie
          x-faker: lorem.paragraphs
        authorId:
          type: string
          description: Keycloak UUID autora
          x-faker: datatype.uuid
        publishedAt:
          type: string
          format: date-time
          description: Data i czas pierwszej publikacji
          x-faker: date.past
        updatedAt:
          type: string
          format: date-time
          description: Data i czas ostatniej edycji
          x-faker: date.past

    PagePostSummaryResponse:
      type: object
      required:
        - content
        - totalElements
        - totalPages
        - number
        - size
        - first
        - last
        - empty
      properties:
        content:
          type: array
          description: Lista postów na bieżącej stronie
          items:
            $ref: "#/components/schemas/PostSummaryResponse"
        totalElements:
          type: integer
          description: Łączna liczba postów
          x-faker: datatype.number
        totalPages:
          type: integer
          description: Łączna liczba stron
          x-faker: datatype.number
        number:
          type: integer
          description: Numer bieżącej strony (0-indexed)
        size:
          type: integer
          description: Rozmiar strony
        first:
          type: boolean
          description: Czy to pierwsza strona
        last:
          type: boolean
          description: Czy to ostatnia strona
        empty:
          type: boolean
          description: Czy lista jest pusta